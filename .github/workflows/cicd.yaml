name: CI/CD Configuration

env:
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  JWT_S: ${{ secrets.JWT_S }}
  SUPABASE_API_URL: ${{ secrets.SUPABASE_API_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  PROJECT_ID: logam-enterprise
  DOCKER_IMAGE_URL: asia-southeast2-docker.pkg.dev/logam-enterprise/enterprise-pos-be-jakarta/enterprise-pos
  REGION: asia-southeast2
  SERVICE_NAME: enterprise-pos-be-jakarta

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x' # matches go.mod version

      - name: Install dependencies
        run: go mod tidy

      - name: Test all Go file
        run: go test -v ./...

      - name: Google Cloud Auth / connect to google account
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_LOGAM_ENTERPRISE }}'
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and Push Docker Image
        run: gcloud builds submit --tag ${{ env.DOCKER_IMAGE_URL }}:latest .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image ${{ env.DOCKER_IMAGE_URL }}:latest \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated
